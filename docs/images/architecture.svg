<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#5b6473"/>
    </marker>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1f2430" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="880" height="460" fill="#f4f5f7"/>
  <text x="32" y="40" font-size="18" font-weight="800" fill="#1f2430">Jak to funguje — architektura</text>

  <!-- Browser / PWA -->
  <rect x="32" y="70" width="300" height="92" rx="14" fill="#fff" stroke="#e3e5ea" filter="url(#s2)"/>
  <text x="52" y="98" font-size="14" font-weight="800" fill="#1f2430">🖥️  Prohlížeč / PWA</text>
  <text x="52" y="120" font-size="12.5" fill="#5b6473">Mac · iPhone (přidat na plochu)</text>
  <text x="52" y="140" font-size="12.5" fill="#5b6473">React Flow plátno, post-it lístečky</text>

  <!-- Next.js / Vercel -->
  <rect x="32" y="208" width="490" height="150" rx="14" fill="#fff" stroke="#e3e5ea" filter="url(#s2)"/>
  <text x="52" y="236" font-size="14" font-weight="800" fill="#1f2430">▲  Next.js 15 (Vercel)</text>
  <rect x="52" y="252" width="200" height="40" rx="9" fill="#6b4eff" opacity="0.10"/>
  <text x="64" y="277" font-size="12.5" font-weight="700" fill="#5a3ff0">UI + React Flow plátno</text>
  <rect x="268" y="252" width="234" height="40" rx="9" fill="#6b4eff" opacity="0.10"/>
  <text x="280" y="277" font-size="12.5" font-weight="700" fill="#5a3ff0">API /api/tasks (GET/POST/PATCH…)</text>
  <rect x="52" y="302" width="450" height="40" rx="9" fill="#fcef9c" opacity="0.6"/>
  <text x="64" y="327" font-size="12.5" font-weight="700" fill="#2a2c20">🔒 iron-session — 1 heslo, šifrovaná httpOnly cookie, rate-limit</text>

  <!-- Supabase -->
  <rect x="32" y="392" width="490" height="56" rx="14" fill="#0f7d5e" opacity="0.10"/>
  <rect x="32" y="392" width="490" height="56" rx="14" fill="none" stroke="#0f7d5e" stroke-opacity="0.4"/>
  <text x="52" y="416" font-size="14" font-weight="800" fill="#0b5e47">🗄️  Supabase Postgres — jediný zdroj pravdy</text>
  <text x="52" y="436" font-size="12" fill="#0b5e47">tabulky  boards · zones · tasks</text>

  <!-- Claude -->
  <rect x="568" y="208" width="280" height="150" rx="14" fill="#fff" stroke="#e3e5ea" filter="url(#s2)"/>
  <text x="588" y="236" font-size="14" font-weight="800" fill="#1f2430">🤖  Claude</text>
  <text x="588" y="260" font-size="12.5" fill="#5b6473">Claude Code · MCP · chat</text>
  <text x="588" y="284" font-size="12.5" fill="#5b6473">čte stav boardu, přidává úkoly,</text>
  <text x="588" y="302" font-size="12.5" fill="#5b6473">doplňuje kontext, „odbaví" inbox</text>
  <text x="588" y="326" font-size="12.5" fill="#5b6473">(zóna PRO CLAUDE)</text>

  <!-- arrows -->
  <line x1="182" y1="162" x2="182" y2="206" stroke="#5b6473" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="182" y1="206" x2="182" y2="162" stroke="#5b6473" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="196" y="190" font-size="11" fill="#5b6473">HTTPS · cookie · polling ~2,5 s</text>

  <line x1="240" y1="358" x2="240" y2="390" stroke="#5b6473" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="300" y1="390" x2="300" y2="358" stroke="#5b6473" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="250" y="378" font-size="10.5" fill="#5b6473">service_role (jen server)</text>

  <path d="M700 358 L700 420 L530 420" fill="none" stroke="#5b6473" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="556" y="412" font-size="11" fill="#5b6473">Supabase MCP</text>
</svg>
